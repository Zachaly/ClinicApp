name: Test pipeline
trigger:
  branches:
    include:
    - main
pool:
  vmImage: 'ubuntu-latest' 
steps:
  - task: UseDotNet@2
    inputs:
      version: '10.x'
  - task: UseDotNet@2
    displayName: 'Install .NET Core SDK'
    inputs:
      version: 10.x
      performMultiLevelLookup: true
  - task: DotNetCoreCLI@2
    displayName: Restore
    inputs:
      command: restore
      projects: '**/*.csproj'
  - task: DotNetCoreCLI@2
    displayName: Build
    inputs:
      command: build
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration)''
  - task: DotNetCoreCLI@2
    inputs:
      command: test
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration)'

