name: Build/Test pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore ./ClinicApp/*.csproj
      
    - name: Build
      run: dotnet build ./ClinicApp/*.csproj --no-restore
      
    - name: Test
      run: dotnet test ./ClinipApp/*.csproj --no-build --verbosity normal
